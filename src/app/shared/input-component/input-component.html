<div  class="relative">

    <input
    type="{{type}}"
    id="floating-input"
    [formControl] = 'control'
    placeholder="you@email.com"
    class="peer p-4 block w-full bg-white border rounded-lg border-gray-300 sm:text-sm text-gray placeholder:text-transparent focus:outline-none focus:border-black focus:ring-black disabled:opacity-50 disabled:pointer-events-none focus:pt-6 focus:pb-2 not-placeholder-shown:pt-6 not-placeholder-shown:pb-2 autofill:pt-6 autofill:pb-2"
  />

  <label
    for="floating-input"
    class="absolute top-0 start-0 p-4 h-full sm:text-sm truncate pointer-events-none transition ease-in-out duration-100 border border-transparent text-gray origin-top-left peer-disabled:opacity-50 peer-disabled:pointer-events-none peer-focus:scale-90 peer-focus:translate-x-0.5 peer-focus:-translate-y-1.5 peer-focus:text-gray-500  peer-not-placeholder-shown:scale-90 peer-not-placeholder-shown:translate-x-0.5 peer-not-placeholder-shown:-translate-y-1.5 peer-not-placeholder-shown:text-gray-500"
    >{{label}}</label
  >

</div>
